<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>武汉日报</title>
  <style>
    :root{--bg:#0b1020;--card:#131a2e;--text:#e9eefc;--muted:#9fb0d9;--line:rgba(255,255,255,.1)}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#0b1020,#111831);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif}
    .wrap{max-width:900px;margin:0 auto;padding:14px}
    .head{position:sticky;top:0;background:rgba(11,16,32,.78);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 0;margin-bottom:10px}
    .meta{color:var(--muted);font-size:13px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .nav{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .nav a{font-size:12px;padding:4px 8px;border:1px solid var(--line);border-radius:8px;background:#1a2340}
    .legend{display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:12px}
    .chip{font-size:12px;padding:2px 8px;border-radius:999px;border:1px solid var(--line)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
    h1{margin:0;font-size:20px} h2{margin:0 0 8px;font-size:16px}
    .item{border-top:1px solid var(--line);padding:10px 0;cursor:pointer}.item:first-child{border-top:0;padding-top:0}
    .why{color:var(--muted);font-size:14px;margin-top:4px}
    .tag{font-size:12px;padding:2px 8px;border-radius:10px;margin-left:8px}
    .A{background:#1f5134}.B{background:#6b5b1e}.C{background:#6b2620}
    .summary{color:var(--muted);font-size:13px;margin-top:4px}
    .detail{margin-top:8px;display:none}
    .item.open .detail{display:block}
    .drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:80}
    .drawer{position:fixed;left:0;right:0;bottom:0;max-height:78vh;background:#121a30;border-top:1px solid var(--line);border-radius:16px 16px 0 0;padding:12px;display:none;z-index:90;overflow:auto}
    .drawer.open,.drawer-mask.open{display:block}
    .drawer-title{font-weight:700;margin-bottom:8px}
    .drawer-close{float:right}
    .item-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
    .btn-link{font-size:12px;padding:2px 8px;border:1px solid var(--line);border-radius:8px;background:#1a2340;color:#cfe0ff;cursor:pointer}
    .src{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
    .src a{font-size:12px;padding:2px 6px;border:1px solid var(--line);border-radius:8px;background:#17203a}
    a{color:#a8c3ff;text-decoration:none}
    select,button{background:#1a2340;color:#eaf0ff;border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="row" style="justify-content:space-between">
      <div>
        <h1>🌸 武汉日报 H5</h1>
        <div id="meta" class="meta">加载中…</div>
        <div class="nav">
          <a href="#sec-special">A 兴业银锡专项</a>
          <a href="#sec-highlights">B 今日要点</a>
          <a href="#sec-deep">C 深度解读</a>
          <a href="#sec-impact">D 对我可能有影响</a>
          <a href="#sec-watch">E 今天值得关注</a>
        </div>
      </div>
      <div class="row">
        <label class="meta">历史日期</label>
        <select id="dateSel"></select>
        <button id="goBtn">查看</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>30秒快读</h2>
    <div class="legend">
      <span class="meta">来源优先级：官方/交易所/公告原文 ＞ 主流媒体/稳定行情页 ＞ 补充线索</span>
    </div>
    <div id="ratio" class="row" style="margin-top:8px"></div>
    <div id="pref" class="meta" style="margin-top:6px"></div>
    <ol id="quick"></ol>
  </div>
  <div id="sections"></div>
</div>
<div id="drawerMask" class="drawer-mask"></div>
<div id="drawer" class="drawer">
  <button id="drawerClose" class="btn-link drawer-close" type="button">关闭</button>
  <div id="drawerBody"></div>
</div>
<script>
const order=[["special","A. 兴业银锡专项"],["highlights","B. 今日要点"],["deep","C. 深度解读"],["impact","D. 对我可能有影响"],["watch","E. 今天值得关注"]];
const PREF_KEY='daily_pref_v1';
// Cloudflare Worker click tracking endpoint
const TRACK_ENDPOINT='https://kv-get-started.zhaowuhan.workers.dev';
function loadPref(){try{return JSON.parse(localStorage.getItem(PREF_KEY)||'{"sections":{},"titles":{},"links":0,"opens":0}')}catch{return {sections:{},titles:{},links:0,opens:0}}}
function savePref(p){localStorage.setItem(PREF_KEY, JSON.stringify(p))}
function bump(obj,key,n=1){obj[key]=(obj[key]||0)+n}
function sendTrack(payload){
  if(!TRACK_ENDPOINT) return;
  const url = TRACK_ENDPOINT.replace(/\/$/, '') + '/api/click';
  const body = JSON.stringify(payload);
  // Use fetch first (more reliable for Cloudflare Worker JSON parsing than sendBeacon in some browsers)
  fetch(url,{method:'POST',headers:{'content-type':'application/json'},body,mode:'cors',keepalive:true})
    .then(()=>{})
    .catch(()=>{
      // fallback beacon (best effort)
      try{
        if(navigator.sendBeacon){
          const blob = new Blob([body], {type:'application/json'});
          navigator.sendBeacon(url, blob);
        }
      }catch{}
    });
}
function hostLabel(url){try{const h=new URL(url).hostname.replace('www.','');return h.split('.').slice(0,2).join('.')}catch{return '来源'}}
function splitSummary(text=''){
  const i=text.indexOf('。');
  if(i===-1) return {summary:text, rest:''};
  return {summary:text.slice(0,i+1), rest:text.slice(i+1).trim()};
}
function item(it,section){
  const parts=splitSummary(it.fact||'');
  const summary=parts.summary;
  const src=(it.links||[]).map(l=>`<a href='${l}' target='_blank' rel='noreferrer'>${hostLabel(l)}</a>`).join('');
  const payload=encodeURIComponent(JSON.stringify({section:section||'',title:it.title||'',fact:it.fact||'',why:it.why||'',digest:it.digest||'',links:it.links||[]}));
  return `<div class='item open-drawer' data-item='${payload}'>
    <div class='item-head'><div><b>${it.title||''}</b><div class='summary'>${it.fact||''}</div></div></div>
    <div class='detail'><div>${it.fact||''}</div><div class='why'>${it.why||''}</div><div class='src'>${src}</div></div>
  </div>`
}
async function load(path){const r=await fetch(path+'?_='+Date.now());if(!r.ok)throw new Error('load failed');return r.json()}
function render(d){document.getElementById('meta').textContent=`${d.date||''} · ${d.window||''}`;const q=document.getElementById('quick');q.innerHTML='';
  const oldHint=document.getElementById('quickHint'); if(oldHint) oldHint.remove();
  const quick=(Array.isArray(d.quick)?d.quick:[]).filter(Boolean);
  if(quick.length){
    quick.forEach(t=>{
      const li=document.createElement('li');
      if(typeof t==='string') li.textContent=t;
      else if(t && typeof t==='object') li.textContent=t.title||t.fact||JSON.stringify(t);
      else li.textContent=String(t);
      q.appendChild(li)
    });
  }else{
    const fb=[...(d.highlights||[]),...(d.special||[])].slice(0,5).map(x=>x?.title).filter(Boolean);
    if(fb.length){
      fb.forEach(t=>{const li=document.createElement('li');li.textContent=t;q.appendChild(li)});
      const hint=document.createElement('div');
      hint.id='quickHint';
      hint.className='meta';
      hint.style.marginTop='6px';
      hint.textContent='快读未单独生成，已自动使用今日核心标题补齐。';
      q.parentElement.appendChild(hint);
    }else{
      const li=document.createElement('li');li.textContent='今日快读暂不可用，请稍后刷新。';q.appendChild(li);
    }
  }
  const hs=d.highlights||[]; const ai=hs.filter(x=>(x.title||'').includes('【科技/AI】')).length; const mk=hs.filter(x=>(x.title||'').includes('【财经/市场】')).length; const ma=hs.filter(x=>(x.title||'').includes('【宏观/国际】')).length;
  document.getElementById('ratio').innerHTML=`<span class='chip'>科技/AI ${ai}</span><span class='chip'>财经/市场 ${mk}</span><span class='chip'>宏观/国际 ${ma}</span>`;
  const s=document.getElementById('sections');s.innerHTML='';const prefNow=loadPref(); order.forEach(([k,t])=>{const c=document.createElement('div');c.className='card';c.id=`sec-${k}`;c.innerHTML=`<h2>${t}</h2>`;const arr=d[k]||[];if(!arr.length)c.innerHTML+=`<div class='why'>该项数据不足</div>`;else {
    const sorted=[...arr].sort((a,b)=>((prefNow.titles?.[b.title]||0)-(prefNow.titles?.[a.title]||0)));
    sorted.forEach(it=>c.innerHTML+=item(it,k));
  } s.appendChild(c)});
  const drawer=document.getElementById('drawer');
  const mask=document.getElementById('drawerMask');
  const body=document.getElementById('drawerBody');
  const pref=loadPref();
  const secTop=Object.entries(pref.sections||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]).join('、')||'暂无';
  document.getElementById('pref').textContent=`你的近期偏好：${secTop}（点击 ${pref.opens||0} 次，来源点击 ${pref.links||0} 次）`;

  const close=()=>{drawer.classList.remove('open');mask.classList.remove('open')};
  document.getElementById('drawerClose').onclick=close; mask.onclick=close;
  document.querySelectorAll('.open-drawer').forEach(btn=>{btn.onclick=()=>{
    try{
      const it=JSON.parse(decodeURIComponent(btn.dataset.item||''));
      const links=(it.links||[]).map(l=>`<a href='${l}' target='_blank' rel='noreferrer' data-track='link'>${hostLabel(l)}</a>`).join('');
      const digest = (it.digest||'').trim();
      const detailText = digest || '该条暂未提供来源摘要（digest 字段）。';
      const cmdPayload = encodeURIComponent(JSON.stringify({title:it.title||'',fact:it.fact||'',why:it.why||'',digest:it.digest||'',links:it.links||[]}));
      body.innerHTML=`<div class='drawer-title'>${it.title||''}</div><div>${detailText}</div><div class='src'>${links}</div><div style='margin-top:10px'><button class='btn-link' data-track='analyze' data-payload='${cmdPayload}'>【解读】</button></div>`;
      drawer.classList.add('open'); mask.classList.add('open');

      bump(pref.sections, it.section || 'unknown');
      bump(pref.titles, it.title || 'unknown');
      pref.opens = (pref.opens||0) + 1;
      savePref(pref);
      sendTrack({type:'open', section: it.section || 'unknown', title: it.title || 'unknown', path: location.pathname});
    }catch(e){console.error(e)}
  }});

  body.addEventListener('click', async (e)=>{
    if(e.target && e.target.dataset && e.target.dataset.track==='link'){
      const p=loadPref();
      p.links=(p.links||0)+1;
      savePref(p);
      const href=e.target.getAttribute('href')||'';
      sendTrack({type:'link', section:'source', title:href, source:hostLabel(href), path: location.pathname});
      return;
    }
    if(e.target && e.target.dataset && e.target.dataset.track==='analyze'){
      try{
        const data=JSON.parse(decodeURIComponent(e.target.dataset.payload||'%7B%7D'));
        const cmd = `请深度解读这条新闻（基于真实信源，并补充检索）：\n标题：${data.title||''}\n事实：${data.fact||''}\n摘要：${data.digest||''}\n来源：${(data.links||[]).join(' , ')}`;
        await navigator.clipboard.writeText(cmd);
        sendTrack({type:'open', section:'analyze', title:data.title||'unknown', path:location.pathname});
        e.target.textContent='已复制解读指令';
        setTimeout(()=>{e.target.textContent='【解读】';},1500);
      }catch(err){
        console.error(err);
        alert('解读指令复制失败，请重试');
      }
    }
  });
}
async function boot(){
  const idx=await load('./data/index.json').catch(()=>({dates:[]}));
  const sel=document.getElementById('dateSel');
  const dates=idx.dates||[];
  if(dates.length){dates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o)});}
  const latest=await load('./data/latest.json'); render(latest);
  document.getElementById('goBtn').onclick=async()=>{const d=sel.value; if(!d) return; const one=await load(`./data/archive/${d}.json`); render(one)};
}
boot();
</script>
</body></html>
