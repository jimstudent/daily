<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>武汉日报</title>
  <style>
    :root{--bg:#0b1020;--card:#131a2e;--text:#e9eefc;--muted:#9fb0d9;--line:rgba(255,255,255,.1)}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#0b1020,#111831);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif}
    .wrap{max-width:900px;margin:0 auto;padding:14px}
    .head{position:sticky;top:0;background:rgba(11,16,32,.78);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 0;margin-bottom:10px}
    .meta{color:var(--muted);font-size:13px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
    h1{margin:0;font-size:20px} h2{margin:0 0 8px;font-size:16px}
    .item{border-top:1px solid var(--line);padding:10px 0}.item:first-child{border-top:0;padding-top:0}
    .why{color:var(--muted);font-size:14px;margin-top:4px}
    .tag{font-size:12px;padding:2px 8px;border-radius:10px;margin-left:8px}
    .A{background:#1f5134}.B{background:#6b5b1e}.C{background:#6b2620}
    a{color:#a8c3ff;text-decoration:none}
    select,button{background:#1a2340;color:#eaf0ff;border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="row" style="justify-content:space-between">
      <div>
        <h1>🌸 武汉日报 H5</h1>
        <div id="meta" class="meta">加载中…</div>
      </div>
      <div class="row">
        <label class="meta">历史日期</label>
        <select id="dateSel"></select>
        <button id="goBtn">查看</button>
      </div>
    </div>
  </div>

  <div class="card"><h2>30秒快读</h2><ol id="quick"></ol></div>
  <div id="sections"></div>
</div>
<script>
const order=[["special","A. 兴业银锡专项"],["highlights","B. 今日要点"],["deep","C. 深度解读"],["impact","D. 对我可能有影响"],["watch","E. 今天值得关注"]];
function item(it){const links=(it.links||[]).map(l=>`<a href='${l}' target='_blank'>来源</a>`).join(' · ');const g=it.grade?`<span class='tag ${it.grade}'>证据${it.grade}</span>`:'';return `<div class='item'><div><b>${it.title||''}</b>${g}</div><div>${it.fact||''}</div><div class='why'>${it.why||''}</div><div>${links}</div></div>`}
async function load(path){const r=await fetch(path+'?_='+Date.now());if(!r.ok)throw new Error('load failed');return r.json()}
function render(d){document.getElementById('meta').textContent=`${d.date||''} · ${d.window||''}`;const q=document.getElementById('quick');q.innerHTML='';(d.quick||[]).forEach(t=>{const li=document.createElement('li');li.textContent=t;q.appendChild(li)});const s=document.getElementById('sections');s.innerHTML='';order.forEach(([k,t])=>{const c=document.createElement('div');c.className='card';c.innerHTML=`<h2>${t}</h2>`;const arr=d[k]||[];if(!arr.length)c.innerHTML+=`<div class='why'>该项数据不足</div>`;else arr.forEach(it=>c.innerHTML+=item(it));s.appendChild(c)});
}
async function boot(){
  const idx=await load('./data/index.json').catch(()=>({dates:[]}));
  const sel=document.getElementById('dateSel');
  const dates=idx.dates||[];
  if(dates.length){dates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o)});}
  const latest=await load('./data/latest.json'); render(latest);
  document.getElementById('goBtn').onclick=async()=>{const d=sel.value; if(!d) return; const one=await load(`./data/archive/${d}.json`); render(one)};
}
boot();
</script>
</body></html>
